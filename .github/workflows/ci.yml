name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Validates source. The committed dist/ bundle is (re)built and committed by
  # build-dist.yml, so there is no drift check here.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Guard against build-vs-runtime Node drift in BOTH directions (Renovate can
      # bump .nvmrc; a human can edit action.yml's `using:`). The renovate.json rule
      # only suppresses the .nvmrc PR; this is the real invariant check.
      - name: Assert .nvmrc major matches the action runtime
        run: |
          nvmrc_major="$(cut -d. -f1 .nvmrc | tr -d '[:space:]')"
          action_node="$(grep -oE 'using:[[:space:]]*"?node[0-9]+' action.yml | grep -oE '[0-9]+')"
          if [ "$nvmrc_major" != "$action_node" ]; then
            echo "::error::.nvmrc major ($nvmrc_major) != action.yml runtime (node$action_node) — bump both together"
            exit 1
          fi
          echo ".nvmrc ($nvmrc_major) matches action runtime node$action_node"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Fail the build on known-high-severity vulns in shipped (production) deps.
      - run: npm audit --omit=dev --audit-level=high
